<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Holiday Food Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #f5ede0;
    --sand-dark: #e8d9c4;
    --terracotta: #c8603a;
    --terracotta-light: #e8896a;
    --olive: #6b7c4f;
    --olive-light: #8fa068;
    --ink: #2a2118;
    --ink-muted: #7a6e62;
    --cream: #fdf8f2;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(42,33,24,0.10);
    --shadow-lg: 0 6px 30px rgba(42,33,24,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header-art {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 10px;
  }

  .header-svg {
    flex-shrink: 0;
    width: 90px;
    height: 80px;
    overflow: visible;
  }

  .header-text {
    flex: 1;
    text-align: center;
    padding-bottom: 4px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1.9rem;
    color: var(--terracotta);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  header p {
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-top: 4px;
    font-weight: 300;
  }

  .panel {
    background: var(--cream);
    border-radius: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--sand-dark);
  }

  .panel-header h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.15rem;
    color: var(--ink);
  }

  .panel-header .icon {
    font-size: 1.2rem;
  }

  /* Date controls */
  .date-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 14px 18px;
    flex-wrap: wrap;
    background: var(--sand);
  }

  .date-field {
    flex: 1;
    min-width: 130px;
  }

  .date-field label {
    display: block;
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    margin-bottom: 5px;
  }

  .date-field input[type="date"] {
    width: 100%;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1.5px solid var(--sand-dark);
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .date-field input[type="date"]:focus {
    border-color: var(--terracotta);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 8px 16px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--terracotta);
    color: white;
  }
  .btn-primary:hover { background: #b55330; }

  .btn-secondary {
    background: var(--sand-dark);
    color: var(--ink);
  }
  .btn-secondary:hover { background: #d9c8b0; }

  .btn-ghost {
    background: transparent;
    color: var(--olive);
    padding: 5px 10px;
    font-size: 0.78rem;
    border: 1.5px dashed var(--olive-light);
  }
  .btn-ghost:hover { background: rgba(107,124,79,0.08); }

  /* Scrollable days area */
  .days-scroll {
    max-height: 420px;
    overflow-y: auto;
    padding: 10px 12px 14px;
  }

  .days-scroll::-webkit-scrollbar { width: 4px; }
  .days-scroll::-webkit-scrollbar-track { background: transparent; }
  .days-scroll::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 4px; }

  /* Day card */
  .day-card {
    border-radius: 12px;
    border: 1.5px solid var(--sand-dark);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .day-card.open { border-color: var(--terracotta-light); }

  .day-summary {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    cursor: pointer;
    user-select: none;
    background: var(--cream);
    list-style: none;
  }

  .day-summary::-webkit-details-marker { display: none; }

  .day-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--sand-dark);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .day-card.open .day-dot { background: var(--terracotta); }

  .day-label {
    flex: 1;
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    font-weight: 500;
  }

  .day-cal-badge {
    font-size: 0.72rem;
    color: var(--ink-muted);
    font-weight: 400;
  }

  .day-chevron {
    font-size: 0.7rem;
    color: var(--ink-muted);
    transition: transform 0.2s;
  }

  .day-card.open .day-chevron { transform: rotate(180deg); }

  .day-body {
    display: none;
    padding: 10px 14px 14px;
    background: var(--white);
    border-top: 1px solid var(--sand-dark);
  }

  .day-card.open .day-body { display: block; }

  /* Food items */
  .food-list { margin-bottom: 10px; }

  .food-item {
    background: var(--cream);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    position: relative;
  }

  .food-name-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .food-name-row input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1.5px solid var(--sand-dark);
    background: var(--white);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .food-name-row input:focus { border-color: var(--terracotta); }

  .btn-remove {
    background: none;
    border: none;
    color: var(--ink-muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    border-radius: 6px;
    line-height: 1;
    transition: color 0.15s;
  }
  .btn-remove:hover { color: var(--terracotta); }

  .nutrient-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 7px;
  }

  .nutrient-field {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .nutrient-field label {
    font-size: 0.62rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
  }

  .nutrient-field input {
    padding: 5px 6px;
    border-radius: 7px;
    border: 1.5px solid var(--sand-dark);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--ink);
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  .nutrient-field input:focus { border-color: var(--terracotta); }

  .food-notes {
    width: 100%;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1.5px solid var(--sand-dark);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--ink);
    outline: none;
    resize: vertical;
    min-height: 44px;
    transition: border-color 0.15s;
  }
  .food-notes:focus { border-color: var(--terracotta); }
  .food-notes::placeholder { color: #b0a898; }

  /* Restaurants panel */
  .restaurants-scroll {
    max-height: 380px;
    overflow-y: auto;
    padding: 10px 12px 14px;
  }

  .restaurants-scroll::-webkit-scrollbar { width: 4px; }
  .restaurants-scroll::-webkit-scrollbar-track { background: transparent; }
  .restaurants-scroll::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 4px; }

  .restaurant-card {
    border-radius: 12px;
    border: 1.5px solid var(--sand-dark);
    margin-bottom: 8px;
    overflow: hidden;
  }

  .restaurant-card.open { border-color: var(--olive-light); }

  .restaurant-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--cream);
    cursor: pointer;
  }

  .restaurant-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--sand-dark);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .restaurant-card.open .restaurant-dot { background: var(--olive); }

  .restaurant-name-input {
    flex: 1;
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    font-weight: 500;
    border: none;
    background: transparent;
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }

  .restaurant-name-input:focus {
    cursor: text;
    background: var(--white);
    border-radius: 6px;
    padding: 2px 6px;
  }

  .restaurant-body {
    display: none;
    padding: 10px 14px 14px;
    background: var(--white);
    border-top: 1px solid var(--sand-dark);
  }

  .restaurant-card.open .restaurant-body { display: block; }

  .meal-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .meal-item input {
    flex: 1;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--sand-dark);
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .meal-item input:focus { border-color: var(--olive); }

  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: var(--ink-muted);
    font-size: 0.85rem;
  }

  .empty-state .big { font-size: 2rem; display: block; margin-bottom: 8px; }

  .restaurant-notes {
    width: 100%;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1.5px solid var(--sand-dark);
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--ink);
    outline: none;
    resize: vertical;
    min-height: 44px;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .restaurant-notes:focus { border-color: var(--olive); }
  .restaurant-notes::placeholder { color: #b0a898; }

  .restaurant-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }

  .btn-delete-restaurant {
    background: none;
    border: 1.5px solid #e0c4c4;
    color: #b05050;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-delete-restaurant:hover {
    background: #fdf0f0;
    border-color: var(--terracotta);
    color: var(--terracotta);
  }

  .restaurant-notes-label {
    font-size: 0.65rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--ink-muted);
    margin-bottom: 4px;
    display: block;
  }

  /* Export panel */
  .export-panel {
    background: var(--cream);
    border-radius: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .export-panel .export-text {
    flex: 1;
    min-width: 160px;
  }

  .export-panel h3 {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--ink);
  }

  .export-panel p {
    font-size: 0.75rem;
    color: var(--ink-muted);
    margin-top: 2px;
  }

  .btn-export {
    background: var(--olive);
    color: white;
    padding: 9px 18px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn-export:hover { background: #576840; }

  .panel-add-row {
    padding: 0 12px 14px;
  }
</style>
</head>
<body>

<header>
  <div class="header-art">
    <!-- Fairy tale castle (left) -->
    <svg class="header-svg castle-svg" viewBox="0 0 110 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Main towers -->
      <rect x="10" y="45" width="20" height="50" fill="#b5779a"/>
      <rect x="40" y="30" width="30" height="65" fill="#c98ab0"/>
      <rect x="80" y="45" width="20" height="50" fill="#b5779a"/>
      <!-- Tower tops (battlements) -->
      <rect x="8" y="38" width="6" height="8" fill="#9a5f86" rx="1"/>
      <rect x="16" y="38" width="6" height="8" fill="#9a5f86" rx="1"/>
      <rect x="24" y="38" width="6" height="8" fill="#9a5f86" rx="1"/>
      <rect x="38" y="22" width="7" height="9" fill="#9a5f86" rx="1"/>
      <rect x="47" y="22" width="7" height="9" fill="#9a5f86" rx="1"/>
      <rect x="56" y="22" width="7" height="9" fill="#9a5f86" rx="1"/>
      <rect x="65" y="22" width="7" height="9" fill="#9a5f86" rx="1"/>
      <rect x="78" y="38" width="6" height="8" fill="#9a5f86" rx="1"/>
      <rect x="86" y="38" width="6" height="8" fill="#9a5f86" rx="1"/>
      <rect x="94" y="38" width="6" height="8" fill="#9a5f86" rx="1"/>
      <!-- Pointy roofs / spires -->
      <polygon points="20,5 13,38 27,38" fill="#e05a7a"/>
      <polygon points="55,0 44,22 66,22" fill="#e05a7a"/>
      <polygon points="90,5 83,38 97,38" fill="#e05a7a"/>
      <!-- Flags -->
      <line x1="20" y1="5" x2="20" y2="0" stroke="#7a4060" stroke-width="1.2"/>
      <polygon points="20,0 28,3 20,6" fill="#ffd700"/>
      <line x1="55" y1="0" x2="55" y2="-5" stroke="#7a4060" stroke-width="1.2"/>
      <polygon points="55,-5 64,-2 55,1" fill="#ffd700"/>
      <!-- Windows -->
      <rect x="17" y="52" width="6" height="8" rx="3" fill="#fde68a"/>
      <rect x="83" y="52" width="6" height="8" rx="3" fill="#fde68a"/>
      <rect x="49" y="38" width="7" height="10" rx="3.5" fill="#fde68a"/>
      <rect x="49" y="55" width="7" height="10" rx="3.5" fill="#fde68a"/>
      <!-- Arched doorway -->
      <rect x="47" y="78" width="16" height="17" rx="8" fill="#7a4060"/>
      <!-- Wall connecting towers -->
      <rect x="30" y="60" width="10" height="35" fill="#b5779a"/>
      <rect x="70" y="60" width="10" height="35" fill="#b5779a"/>
      <!-- Ground -->
      <rect x="0" y="95" width="110" height="5" rx="2" fill="#8fa068" opacity="0.5"/>
    </svg>

    <div class="header-text">
      <h1>Holiday Food Diary</h1>
      <p>Track meals &amp; restaurants on your trip</p>
    </div>

    <!-- Cruise ship (right) -->
    <svg class="header-svg ship-svg" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Sea -->
      <ellipse cx="60" cy="92" rx="58" ry="8" fill="#4a90c4" opacity="0.25"/>
      <!-- Hull -->
      <path d="M10,70 L110,70 L100,90 L20,90 Z" fill="#1a3a6b"/>
      <!-- Hull stripe -->
      <rect x="10" y="70" width="100" height="5" fill="#e63030"/>
      <!-- Superstructure levels -->
      <rect x="25" y="45" width="70" height="25" rx="2" fill="#f0f4f8"/>
      <rect x="32" y="28" width="56" height="18" rx="2" fill="#e8eef4"/>
      <rect x="40" y="16" width="40" height="13" rx="2" fill="#dce6f0"/>
      <!-- Portholes (hull) -->
      <circle cx="35" cy="80" r="4" fill="#2563a8" stroke="white" stroke-width="1.2"/>

      <rect x="66" y="51" width="8" height="6" rx="1" fill="#b8d4f0"/>

      <!-- Windows row 2 -->
      <rect x="36" y="33" width="7" height="5" rx="1" fill="#c8dff5"/>

      <rect x="58" y="33" width="7" height="5" rx="1" fill="#c8dff5"/>
      <rect x="69" y="33" width="7" height="5" rx="1" fill="#c8dff5"/>

      <rect x="52" y="6" width="16" height="12" rx="3" fill="#e63030"/>
      <rect x="54" y="3" width="12" height="5" rx="2" fill="#cc2020"/>
      <!-- Smoke puffs -->
      <circle cx="60" cy="1" r="3" fill="#ccc" opacity="0.6"/>
      <circle cx="65" cy="-2" r="2" fill="#ccc" opacity="0.4"/>
      <!-- Flag on mast -->
      <line x1="60" y1="6" x2="60" y2="-8" stroke="#555" stroke-width="1.2"/>
      <!-- French tricolore: blue, white, red -->
      <rect x="60" y="-8" width="4" height="8" fill="#002395"/>
      <rect x="64" y="-8" width="4" height="8" fill="#ffffff"/>
      <rect x="68" y="-8" width="4" height="8" fill="#ED2939"/>
      <!-- Anchor decoration on hull -->
      <text x="54" y="87" font-size="8" fill="white" opacity="0.5">⚓</text>
      <!-- Wake lines -->
      <path d="M5,88 Q20,84 35,88" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M85,88 Q100,84 115,88" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
    </svg>
  </div>
</header>

<!-- Daily Diary Panel -->
<div class="panel">
  <div class="panel-header">
    <span class="icon">📅</span>
    <h2>Daily Diary</h2>
  </div>

  <div class="date-row">
    <div class="date-field">
      <label>Start Date</label>
      <input type="date" id="startDate">
    </div>
    <div class="date-field">
      <label>End Date</label>
      <input type="date" id="endDate">
    </div>
    <button class="btn btn-primary" onclick="generateDays()">Generate Days</button>
  </div>

  <div class="days-scroll" id="daysContainer">
    <div class="empty-state">
      <span class="big">🗓️</span>
      Set your holiday dates above to get started
    </div>
  </div>
</div>

<!-- Restaurants Panel -->
<div class="panel">
  <div class="panel-header">
    <span class="icon">🍽️</span>
    <h2>Restaurants</h2>
  </div>

  <div class="restaurants-scroll" id="restaurantContainer">
    <div class="empty-state">
      <span class="big">🍴</span>
      No restaurants added yet
    </div>
  </div>

  <div class="panel-add-row">
    <button class="btn btn-ghost" onclick="addRestaurant()">＋ Add Restaurant</button>
  </div>
</div>

<!-- Export Panel -->
<div class="export-panel">
  <div class="export-text">
    <h3>📥 Export Diary</h3>
    <p>Save all diary data as a JSON file</p>
  </div>
  <button class="btn-export" onclick="exportJSON()">⬇ Download JSON</button>
</div>

<script>
// ===== STORAGE =====
function save(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}
function load(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
  catch { return fallback; }
}

// ===== DAYS =====
function generateDays() {
  const startVal = document.getElementById("startDate").value;
  const endVal = document.getElementById("endDate").value;
  if (!startVal || !endVal) return;

  const start = new Date(startVal + "T00:00:00");
  const end = new Date(endVal + "T00:00:00");
  if (end < start) return;

  const existing = load("days", []);
  const existingMap = {};
  existing.forEach(d => { existingMap[d.dateStr] = d; });

  const days = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const dateStr = d.toISOString().slice(0, 10);
    days.push(existingMap[dateStr] || { dateStr, foods: [] });
  }

  save("days", days);
  save("tripDates", { start: startVal, end: endVal });
  renderDays();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function totalCals(foods) {
  const total = foods.reduce((s, f) => s + (parseFloat(f.calories) || 0), 0);
  return total > 0 ? `${Math.round(total)} kcal` : '';
}

function renderDays() {
  const container = document.getElementById("daysContainer");
  const days = load("days", []);

  if (!days.length) {
    container.innerHTML = `<div class="empty-state"><span class="big">🗓️</span>Set your holiday dates above to get started</div>`;
    return;
  }

  container.innerHTML = days.map((day, i) => {
    const cals = totalCals(day.foods);
    return `
    <div class="day-card" id="day-card-${i}">
      <div class="day-summary" onclick="toggleDay(${i})">
        <div class="day-dot"></div>
        <span class="day-label">${formatDate(day.dateStr)}</span>
        ${cals ? `<span class="day-cal-badge">${cals}</span>` : ''}
        <span class="day-chevron">▼</span>
      </div>
      <div class="day-body">
        <div class="food-list" id="food-list-${i}">
          ${day.foods.map((food, j) => renderFoodItem(i, j, food)).join('')}
        </div>
        <button class="btn btn-ghost" onclick="addFood(${i})">＋ Add Food</button>
      </div>
    </div>`;
  }).join('');
}

function toggleDay(i) {
  const card = document.getElementById(`day-card-${i}`);
  card.classList.toggle('open');
}

// ===== FOOD =====
function renderFoodItem(dayIndex, foodIndex, food) {
  const fields = [
    ['calories', 'Kcal'], ['fat', 'Fat (g)'], ['satfat', 'Sat Fat'],
    ['fibre', 'Fibre'], ['protein', 'Protein'], ['carbs', 'Carbs'],
    ['sugar', 'Sugar']
  ];
  return `
  <div class="food-item" id="food-${dayIndex}-${foodIndex}">
    <div class="food-name-row">
      <input placeholder="Food name" value="${esc(food.name || '')}"
        onchange="updateFood(${dayIndex},${foodIndex},'name',this.value)"
        oninput="updateFood(${dayIndex},${foodIndex},'name',this.value)">
      <button class="btn-remove" onclick="removeFood(${dayIndex},${foodIndex})" title="Remove">✕</button>
    </div>
    <div class="nutrient-grid">
      ${fields.map(([key, label]) => `
        <div class="nutrient-field">
          <label>${label}</label>
          <input type="number" min="0" step="0.1" placeholder="—"
            value="${esc(food[key] || '')}"
            onchange="updateFood(${dayIndex},${foodIndex},'${key}',this.value)">
        </div>`).join('')}
    </div>
    <textarea class="food-notes" placeholder="Notes…"
      onchange="updateFood(${dayIndex},${foodIndex},'notes',this.value)"
      oninput="updateFood(${dayIndex},${foodIndex},'notes',this.value)">${esc(food.notes || '')}</textarea>
  </div>`;
}

function addFood(dayIndex) {
  const days = load("days", []);
  days[dayIndex].foods.push({});
  save("days", days);
  // Only re-render the food list, not the whole panel
  document.getElementById(`food-list-${dayIndex}`).innerHTML =
    days[dayIndex].foods.map((f, j) => renderFoodItem(dayIndex, j, f)).join('');
  updateCalBadge(dayIndex, days[dayIndex].foods);
}

function removeFood(dayIndex, foodIndex) {
  const days = load("days", []);
  days[dayIndex].foods.splice(foodIndex, 1);
  save("days", days);
  document.getElementById(`food-list-${dayIndex}`).innerHTML =
    days[dayIndex].foods.map((f, j) => renderFoodItem(dayIndex, j, f)).join('');
  updateCalBadge(dayIndex, days[dayIndex].foods);
}

function updateFood(dayIndex, foodIndex, field, value) {
  const days = load("days", []);
  if (!days[dayIndex] || !days[dayIndex].foods[foodIndex]) return;
  days[dayIndex].foods[foodIndex][field] = value;
  save("days", days);
  if (field === 'calories') updateCalBadge(dayIndex, days[dayIndex].foods);
}

function updateCalBadge(dayIndex, foods) {
  const card = document.getElementById(`day-card-${dayIndex}`);
  if (!card) return;
  const badge = card.querySelector('.day-cal-badge');
  const cals = totalCals(foods);
  if (badge) {
    badge.textContent = cals;
  } else if (cals) {
    const chevron = card.querySelector('.day-chevron');
    const b = document.createElement('span');
    b.className = 'day-cal-badge';
    b.textContent = cals;
    card.querySelector('.day-summary').insertBefore(b, chevron);
  }
}

// ===== RESTAURANTS =====
function addRestaurant() {
  const data = load("restaurants", []);
  data.push({ name: "", notes: "", meals: [] });
  save("restaurants", data);
  renderRestaurants();
  setTimeout(() => {
    const cards = document.querySelectorAll('.restaurant-card');
    if (cards.length) cards[cards.length - 1].classList.add('open');
  }, 10);
}

function renderRestaurants() {
  const container = document.getElementById("restaurantContainer");
  const data = load("restaurants", []);

  if (!data.length) {
    container.innerHTML = `<div class="empty-state"><span class="big">🍴</span>No restaurants added yet</div>`;
    return;
  }

  container.innerHTML = data.map((r, i) => `
    <div class="restaurant-card" id="rest-card-${i}">
      <div class="restaurant-header" onclick="toggleRestaurant(event, ${i})">
        <div class="restaurant-dot"></div>
        <input class="restaurant-name-input" placeholder="Restaurant name"
          value="${esc(r.name || '')}"
          onchange="updateRestaurantField(${i},'name',this.value)"
          oninput="updateRestaurantField(${i},'name',this.value)"
          onclick="event.stopPropagation()">
        <span class="day-chevron">▼</span>
      </div>
      <div class="restaurant-body">
        <label class="restaurant-notes-label">Notes</label>
        <textarea class="restaurant-notes" placeholder="Address, cuisine, rating, thoughts…"
          onchange="updateRestaurantField(${i},'notes',this.value)"
          oninput="updateRestaurantField(${i},'notes',this.value)">${esc(r.notes || '')}</textarea>
        <div class="meal-list" id="meal-list-${i}">
          ${r.meals.map((m, j) => renderMealItem(i, j, m)).join('')}
        </div>
        <div class="restaurant-actions">
          <button class="btn btn-ghost" onclick="addMeal(${i})">＋ Add Meal</button>
          <button class="btn-delete-restaurant" onclick="removeRestaurant(${i})">🗑 Delete restaurant</button>
        </div>
      </div>
    </div>`).join('');
}

function toggleRestaurant(e, i) {
  document.getElementById(`rest-card-${i}`).classList.toggle('open');
}

function renderMealItem(restIndex, mealIndex, meal) {
  return `
  <div class="meal-item">
    <input placeholder="Meal name" value="${esc(meal || '')}"
      onchange="updateMeal(${restIndex},${mealIndex},this.value)"
      oninput="updateMeal(${restIndex},${mealIndex},this.value)">
    <button class="btn-remove" onclick="removeMeal(${restIndex},${mealIndex})" title="Remove">✕</button>
  </div>`;
}

function addMeal(i) {
  const data = load("restaurants", []);
  data[i].meals.push("");
  save("restaurants", data);
  document.getElementById(`meal-list-${i}`).innerHTML =
    data[i].meals.map((m, j) => renderMealItem(i, j, m)).join('');
}

function removeMeal(restIndex, mealIndex) {
  const data = load("restaurants", []);
  data[restIndex].meals.splice(mealIndex, 1);
  save("restaurants", data);
  document.getElementById(`meal-list-${restIndex}`).innerHTML =
    data[restIndex].meals.map((m, j) => renderMealItem(restIndex, j, m)).join('');
}

function updateRestaurantField(i, field, value) {
  const data = load("restaurants", []);
  data[i][field] = value;
  save("restaurants", data);
}

function updateRestaurant(i, value) {
  updateRestaurantField(i, 'name', value);
}

function removeRestaurant(i) {
  const data = load("restaurants", []);
  data.splice(i, 1);
  save("restaurants", data);
  renderRestaurants();
}

function updateMeal(i, j, value) {
  const data = load("restaurants", []);
  data[i].meals[j] = value;
  save("restaurants", data);
}

// ===== UTILS =====
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== EXPORT =====
function exportJSON() {
  const tripDates = load("tripDates", null);
  const days = load("days", []);
  const restaurants = load("restaurants", []);

  const exportData = {
    exported: new Date().toISOString(),
    trip: tripDates,
    days,
    restaurants
  };

  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const filename = tripDates
    ? `holiday-diary-${tripDates.start}-to-${tripDates.end}.json`
    : `holiday-diary-${new Date().toISOString().slice(0,10)}.json`;
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ===== INIT =====
const saved = load("tripDates", null);
if (saved) {
  document.getElementById("startDate").value = saved.start;
  document.getElementById("endDate").value = saved.end;
}
renderDays();
renderRestaurants();
</script>
