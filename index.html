<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Holiday Food Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #f5ede0;
    --sand-dark: #e8d9c4;
    --terracotta: #c8603a;
    --terracotta-light: #e8896a;
    --olive: #6b7c4f;
    --olive-light: #8fa068;
    --ink: #2a2118;
    --ink-muted: #7a6e62;
    --cream: #fdf8f2;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(42,33,24,0.10);
    --shadow-lg: 0 6px 30px rgba(42,33,24,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 2.2rem;
    color: var(--terracotta);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  header p {
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-top: 4px;
    font-weight: 300;
  }

  .panel {
    background: var(--cream);
    border-radius: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--sand-dark);
  }

  .panel-header h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.15rem;
    color: var(--ink);
  }

  .panel-header .icon {
    font-size: 1.2rem;
  }

  /* Date controls */
  .date-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 14px 18px;
    flex-wrap: wrap;
    background: var(--sand);
  }

  .date-field {
    flex: 1;
    min-width: 130px;
  }

  .date-field label {
    display: block;
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    margin-bottom: 5px;
  }

  .date-field input[type="date"] {
    width: 100%;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1.5px solid var(--sand-dark);
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .date-field input[type="date"]:focus {
    border-color: var(--terracotta);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 8px 16px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--terracotta);
    color: white;
  }
  .btn-primary:hover { background: #b55330; }

  .btn-secondary {
    background: var(--sand-dark);
    color: var(--ink);
  }
  .btn-secondary:hover { background: #d9c8b0; }

  .btn-ghost {
    background: transparent;
    color: var(--olive);
    padding: 5px 10px;
    font-size: 0.78rem;
    border: 1.5px dashed var(--olive-light);
  }
  .btn-ghost:hover { background: rgba(107,124,79,0.08); }

  /* Scrollable days area */
  .days-scroll {
    max-height: 420px;
    overflow-y: auto;
    padding: 10px 12px 14px;
  }

  .days-scroll::-webkit-scrollbar { width: 4px; }
  .days-scroll::-webkit-scrollbar-track { background: transparent; }
  .days-scroll::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 4px; }

  /* Day card */
  .day-card {
    border-radius: 12px;
    border: 1.5px solid var(--sand-dark);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .day-card.open { border-color: var(--terracotta-light); }

  .day-summary {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    cursor: pointer;
    user-select: none;
    background: var(--cream);
    list-style: none;
  }

  .day-summary::-webkit-details-marker { display: none; }

  .day-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--sand-dark);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .day-card.open .day-dot { background: var(--terracotta); }

  .day-label {
    flex: 1;
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    font-weight: 500;
  }

  .day-cal-badge {
    font-size: 0.72rem;
    color: var(--ink-muted);
    font-weight: 400;
  }

  .day-chevron {
    font-size: 0.7rem;
    color: var(--ink-muted);
    transition: transform 0.2s;
  }

  .day-card.open .day-chevron { transform: rotate(180deg); }

  .day-body {
    display: none;
    padding: 10px 14px 14px;
    background: var(--white);
    border-top: 1px solid var(--sand-dark);
  }

  .day-card.open .day-body { display: block; }

  /* Food items */
  .food-list { margin-bottom: 10px; }

  .food-item {
    background: var(--cream);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    position: relative;
  }

  .food-name-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .food-name-row input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1.5px solid var(--sand-dark);
    background: var(--white);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .food-name-row input:focus { border-color: var(--terracotta); }

  .btn-remove {
    background: none;
    border: none;
    color: var(--ink-muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    border-radius: 6px;
    line-height: 1;
    transition: color 0.15s;
  }
  .btn-remove:hover { color: var(--terracotta); }

  .nutrient-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 7px;
  }

  .nutrient-field {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .nutrient-field label {
    font-size: 0.62rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
  }

  .nutrient-field input {
    padding: 5px 6px;
    border-radius: 7px;
    border: 1.5px solid var(--sand-dark);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--ink);
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  .nutrient-field input:focus { border-color: var(--terracotta); }

  .food-notes {
    width: 100%;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1.5px solid var(--sand-dark);
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--ink);
    outline: none;
    resize: vertical;
    min-height: 44px;
    transition: border-color 0.15s;
  }
  .food-notes:focus { border-color: var(--terracotta); }
  .food-notes::placeholder { color: #b0a898; }

  /* Restaurants panel */
  .restaurants-scroll {
    max-height: 380px;
    overflow-y: auto;
    padding: 10px 12px 14px;
  }

  .restaurants-scroll::-webkit-scrollbar { width: 4px; }
  .restaurants-scroll::-webkit-scrollbar-track { background: transparent; }
  .restaurants-scroll::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 4px; }

  .restaurant-card {
    border-radius: 12px;
    border: 1.5px solid var(--sand-dark);
    margin-bottom: 8px;
    overflow: hidden;
  }

  .restaurant-card.open { border-color: var(--olive-light); }

  .restaurant-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--cream);
    cursor: pointer;
  }

  .restaurant-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--sand-dark);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .restaurant-card.open .restaurant-dot { background: var(--olive); }

  .restaurant-name-input {
    flex: 1;
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    font-weight: 500;
    border: none;
    background: transparent;
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }

  .restaurant-name-input:focus {
    cursor: text;
    background: var(--white);
    border-radius: 6px;
    padding: 2px 6px;
  }

  .restaurant-body {
    display: none;
    padding: 10px 14px 14px;
    background: var(--white);
    border-top: 1px solid var(--sand-dark);
  }

  .restaurant-card.open .restaurant-body { display: block; }

  .meal-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .meal-item input {
    flex: 1;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--sand-dark);
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .meal-item input:focus { border-color: var(--olive); }

  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: var(--ink-muted);
    font-size: 0.85rem;
  }

  .empty-state .big { font-size: 2rem; display: block; margin-bottom: 8px; }

  .panel-add-row {
    padding: 0 12px 14px;
  }
</style>
</head>
<body>

<header>
  <h1>🌴 Holiday Food Diary</h1>
  <p>Track meals & restaurants on your trip</p>
</header>

<!-- Daily Diary Panel -->
<div class="panel">
  <div class="panel-header">
    <span class="icon">📅</span>
    <h2>Daily Diary</h2>
  </div>

  <div class="date-row">
    <div class="date-field">
      <label>Start Date</label>
      <input type="date" id="startDate">
    </div>
    <div class="date-field">
      <label>End Date</label>
      <input type="date" id="endDate">
    </div>
    <button class="btn btn-primary" onclick="generateDays()">Generate Days</button>
  </div>

  <div class="days-scroll" id="daysContainer">
    <div class="empty-state">
      <span class="big">🗓️</span>
      Set your holiday dates above to get started
    </div>
  </div>
</div>

<!-- Restaurants Panel -->
<div class="panel">
  <div class="panel-header">
    <span class="icon">🍽️</span>
    <h2>Restaurants</h2>
  </div>

  <div class="restaurants-scroll" id="restaurantContainer">
    <div class="empty-state">
      <span class="big">🍴</span>
      No restaurants added yet
    </div>
  </div>

  <div class="panel-add-row">
    <button class="btn btn-ghost" onclick="addRestaurant()">＋ Add Restaurant</button>
  </div>
</div>

<script>
// ===== STORAGE =====
function save(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}
function load(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
  catch { return fallback; }
}

// ===== DAYS =====
function generateDays() {
  const startVal = document.getElementById("startDate").value;
  const endVal = document.getElementById("endDate").value;
  if (!startVal || !endVal) return;

  const start = new Date(startVal + "T00:00:00");
  const end = new Date(endVal + "T00:00:00");
  if (end < start) return;

  const existing = load("days", []);
  const existingMap = {};
  existing.forEach(d => { existingMap[d.dateStr] = d; });

  const days = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const dateStr = d.toISOString().slice(0, 10);
    days.push(existingMap[dateStr] || { dateStr, foods: [] });
  }

  save("days", days);
  save("tripDates", { start: startVal, end: endVal });
  renderDays();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function totalCals(foods) {
  const total = foods.reduce((s, f) => s + (parseFloat(f.calories) || 0), 0);
  return total > 0 ? `${Math.round(total)} kcal` : '';
}

function renderDays() {
  const container = document.getElementById("daysContainer");
  const days = load("days", []);

  if (!days.length) {
    container.innerHTML = `<div class="empty-state"><span class="big">🗓️</span>Set your holiday dates above to get started</div>`;
    return;
  }

  container.innerHTML = days.map((day, i) => {
    const cals = totalCals(day.foods);
    return `
    <div class="day-card" id="day-card-${i}">
      <div class="day-summary" onclick="toggleDay(${i})">
        <div class="day-dot"></div>
        <span class="day-label">${formatDate(day.dateStr)}</span>
        ${cals ? `<span class="day-cal-badge">${cals}</span>` : ''}
        <span class="day-chevron">▼</span>
      </div>
      <div class="day-body">
        <div class="food-list" id="food-list-${i}">
          ${day.foods.map((food, j) => renderFoodItem(i, j, food)).join('')}
        </div>
        <button class="btn btn-ghost" onclick="addFood(${i})">＋ Add Food</button>
      </div>
    </div>`;
  }).join('');
}

function toggleDay(i) {
  const card = document.getElementById(`day-card-${i}`);
  card.classList.toggle('open');
}

// ===== FOOD =====
function renderFoodItem(dayIndex, foodIndex, food) {
  const fields = [
    ['calories', 'Kcal'], ['fat', 'Fat (g)'], ['satfat', 'Sat Fat'],
    ['fibre', 'Fibre'], ['protein', 'Protein'], ['carbs', 'Carbs'],
    ['sugar', 'Sugar']
  ];
  return `
  <div class="food-item" id="food-${dayIndex}-${foodIndex}">
    <div class="food-name-row">
      <input placeholder="Food name" value="${esc(food.name || '')}"
        onchange="updateFood(${dayIndex},${foodIndex},'name',this.value)"
        oninput="updateFood(${dayIndex},${foodIndex},'name',this.value)">
      <button class="btn-remove" onclick="removeFood(${dayIndex},${foodIndex})" title="Remove">✕</button>
    </div>
    <div class="nutrient-grid">
      ${fields.map(([key, label]) => `
        <div class="nutrient-field">
          <label>${label}</label>
          <input type="number" min="0" step="0.1" placeholder="—"
            value="${esc(food[key] || '')}"
            onchange="updateFood(${dayIndex},${foodIndex},'${key}',this.value)">
        </div>`).join('')}
    </div>
    <textarea class="food-notes" placeholder="Notes…"
      onchange="updateFood(${dayIndex},${foodIndex},'notes',this.value)"
      oninput="updateFood(${dayIndex},${foodIndex},'notes',this.value)">${esc(food.notes || '')}</textarea>
  </div>`;
}

function addFood(dayIndex) {
  const days = load("days", []);
  days[dayIndex].foods.push({});
  save("days", days);
  // Only re-render the food list, not the whole panel
  document.getElementById(`food-list-${dayIndex}`).innerHTML =
    days[dayIndex].foods.map((f, j) => renderFoodItem(dayIndex, j, f)).join('');
  updateCalBadge(dayIndex, days[dayIndex].foods);
}

function removeFood(dayIndex, foodIndex) {
  const days = load("days", []);
  days[dayIndex].foods.splice(foodIndex, 1);
  save("days", days);
  document.getElementById(`food-list-${dayIndex}`).innerHTML =
    days[dayIndex].foods.map((f, j) => renderFoodItem(dayIndex, j, f)).join('');
  updateCalBadge(dayIndex, days[dayIndex].foods);
}

function updateFood(dayIndex, foodIndex, field, value) {
  const days = load("days", []);
  if (!days[dayIndex] || !days[dayIndex].foods[foodIndex]) return;
  days[dayIndex].foods[foodIndex][field] = value;
  save("days", days);
  if (field === 'calories') updateCalBadge(dayIndex, days[dayIndex].foods);
}

function updateCalBadge(dayIndex, foods) {
  const card = document.getElementById(`day-card-${dayIndex}`);
  if (!card) return;
  const badge = card.querySelector('.day-cal-badge');
  const cals = totalCals(foods);
  if (badge) {
    badge.textContent = cals;
  } else if (cals) {
    const chevron = card.querySelector('.day-chevron');
    const b = document.createElement('span');
    b.className = 'day-cal-badge';
    b.textContent = cals;
    card.querySelector('.day-summary').insertBefore(b, chevron);
  }
}

// ===== RESTAURANTS =====
function addRestaurant() {
  const data = load("restaurants", []);
  data.push({ name: "", meals: [] });
  save("restaurants", data);
  renderRestaurants();
  // Open the new one
  setTimeout(() => {
    const cards = document.querySelectorAll('.restaurant-card');
    if (cards.length) cards[cards.length - 1].classList.add('open');
  }, 10);
}

function renderRestaurants() {
  const container = document.getElementById("restaurantContainer");
  const data = load("restaurants", []);

  if (!data.length) {
    container.innerHTML = `<div class="empty-state"><span class="big">🍴</span>No restaurants added yet</div>`;
    return;
  }

  container.innerHTML = data.map((r, i) => `
    <div class="restaurant-card" id="rest-card-${i}">
      <div class="restaurant-header" onclick="toggleRestaurant(event, ${i})">
        <div class="restaurant-dot"></div>
        <input class="restaurant-name-input" placeholder="Restaurant name"
          value="${esc(r.name || '')}"
          onchange="updateRestaurant(${i}, this.value)"
          oninput="updateRestaurant(${i}, this.value)"
          onclick="event.stopPropagation()">
        <button class="btn-remove" onclick="event.stopPropagation(); removeRestaurant(${i})" title="Remove">✕</button>
        <span class="day-chevron">▼</span>
      </div>
      <div class="restaurant-body">
        <div class="meal-list" id="meal-list-${i}">
          ${r.meals.map((m, j) => renderMealItem(i, j, m)).join('')}
        </div>
        <button class="btn btn-ghost" onclick="addMeal(${i})">＋ Add Meal</button>
      </div>
    </div>`).join('');
}

function toggleRestaurant(e, i) {
  document.getElementById(`rest-card-${i}`).classList.toggle('open');
}

function renderMealItem(restIndex, mealIndex, meal) {
  return `
  <div class="meal-item">
    <input placeholder="Meal name" value="${esc(meal || '')}"
      onchange="updateMeal(${restIndex},${mealIndex},this.value)"
      oninput="updateMeal(${restIndex},${mealIndex},this.value)">
    <button class="btn-remove" onclick="removeMeal(${restIndex},${mealIndex})" title="Remove">✕</button>
  </div>`;
}

function addMeal(i) {
  const data = load("restaurants", []);
  data[i].meals.push("");
  save("restaurants", data);
  document.getElementById(`meal-list-${i}`).innerHTML =
    data[i].meals.map((m, j) => renderMealItem(i, j, m)).join('');
}

function removeMeal(restIndex, mealIndex) {
  const data = load("restaurants", []);
  data[restIndex].meals.splice(mealIndex, 1);
  save("restaurants", data);
  document.getElementById(`meal-list-${restIndex}`).innerHTML =
    data[restIndex].meals.map((m, j) => renderMealItem(restIndex, j, m)).join('');
}

function updateRestaurant(i, value) {
  const data = load("restaurants", []);
  data[i].name = value;
  save("restaurants", data);
}

function removeRestaurant(i) {
  const data = load("restaurants", []);
  data.splice(i, 1);
  save("restaurants", data);
  renderRestaurants();
}

function updateMeal(i, j, value) {
  const data = load("restaurants", []);
  data[i].meals[j] = value;
  save("restaurants", data);
}

// ===== UTILS =====
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== INIT =====
const saved = load("tripDates", null);
if (saved) {
  document.getElementById("startDate").value = saved.start;
  document.getElementById("endDate").value = saved.end;
}
renderDays();
renderRestaurants();
</script>
</body>
</html>
